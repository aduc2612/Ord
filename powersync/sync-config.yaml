# yaml-language-server: $schema=https://unpkg.com/@powersync/service-sync-rules@latest/schema/sync_rules.json

config:
  edition: 3

streams:
  tasks:
    auto_subscribe: true
    queries:
      - SELECT * FROM tasks WHERE user_id = auth.user_id()
  projects:
    auto_subscribe: true
    queries:
      - SELECT * FROM projects WHERE user_id = auth.user_id()
  tags:
    auto_subscribe: true
    queries:
      - SELECT * FROM tags WHERE user_id = auth.user_id()
  task_tags:
    auto_subscribe: true
    queries:
      - SELECT * FROM task_tags WHERE user_id = auth.user_id()
